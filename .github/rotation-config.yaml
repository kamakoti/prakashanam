# Master table of all AmritaSiddhi occurrences (past + future).
#
# The daily rotation workflow (04:00 IST) uses this table to keep
# AmritaSiddhi/ pointing at the next upcoming occurrence.
#
# BEHAVIOUR:
#   - AmritaSiddhi/ is a "current event" alias — its index.md always describes
#     the earliest occurrence with date >= today.
#   - When today crosses past an event, the workflow archives the current
#     folder as AmritaSiddhi-<old-date>/ and materialises the next entry.
#   - README.md and cover.jpg are copied from the just-archived folder into
#     the new one (both are constant across occurrences).
#   - Archived folders are FROZEN. Editing this file only affects the current
#     folder; past AmritaSiddhi-<date>/ folders are untouched.
#   - Entries are NEVER removed from this file by the workflow — this is
#     the source-of-truth table you maintain by hand.
#
# MAINTENANCE:
#   - Append new occurrences as dates are announced (any order works — the
#     workflow sorts by date).
#   - Tamil `date` is auto-generated from the ISO date; supply only Tamil
#     `desc` and `tithi`.
#   - Fix typos for a past event? Edit the archived folder's index.md
#     directly; this file drives only the current alias.
#
# SAMVATSARA NOTE:
#   - Kali 5128 = Paraabhava = 2026-Apr-14 to 2027-Apr-13
#   - Kali 5129 = Plavanga   = 2027-Apr-14 to 2028-Apr-12
#   Boundary: solar Mesha Sankranti (Chittirai 1).

