name: Queue tweets via Google Calendar

on:
  schedule:
    # 05:00 IST = 23:30 UTC previous day
    - cron: '30 23 * * *'
  workflow_dispatch:  # manual trigger for testing

permissions:
  contents: write  # needed to commit tweeted.json back

jobs:
  queue:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml google-auth google-api-python-client

      - name: Queue calendar events
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          CALENDAR_ID:                 ${{ secrets.CALENDAR_ID }}
        run: python scripts/queue_tweets.py

      - name: Commit ledger if updated
        run: |
          if [[ -n "$(git status --porcelain .github/tweeted.json)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .github/tweeted.json
            git commit -m "chore: update tweeted ledger [skip ci]"
            git push
          fi
